<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- Main app wrapper -->
    <div class="app">
      <h1>Budget Tracker</h1>

      <!-- Balance (add this if not present – common in the video) -->
      <div class="balance">
        <h4>Your Balance</h4>
        <h1 id="balance">₹ 0.00</h1>
      </div>

      <!-- Income & Expense side-by-side -->
      <div class="inc-exp-container">
        <div class="inc">
          <h4>Income</h4>
          <p id="inc-amt" class="amt plus">₹ 0.00</p>
        </div>
        <div class="exp">
          <h4>Expense</h4>
          <p id="exp-amt" class="amt minus">₹ 0.00</p>
        </div>
      </div>

      <!-- Form below (centered) -->
      <h3>Add New Transaction</h3>
     <form id="form">
  <div class="form-control">
    <label for="text">Text</label>
    <input type="text" id="text" placeholder="e.g. salary" required />
  </div>

  <div class="form-control">
    <label for="category">Category</label>
    <select id="category" required>
      <option value="">Select Category</option>
      <option value="Salary">Salary</option>
      <option value="Food">Food</option>
      <option value="Transport">Transport</option>
      <option value="Entertainment">Entertainment</option>
      <option value="Bills">Bills</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div class="form-control">
    <label for="date">Date</label>
    <input type="date" id="date" required />
  </div>

  <div class="form-control">
    <label for="amount">Amount<br>
      <small>(negative - expense, positive - income)</small>
    </label>
    <input type="number" id="amount" placeholder="e.g. 1000 or -500" step="0.01" required />
  </div>

  <button class="btn" type="submit">Add Transaction</button>
</form>

      <!-- Action buttons -->
      <div class="action-buttons">
        <button id="export-btn" class="btn secondary">Export to CSV</button>
        <button id="clear-btn" class="btn danger">Clear All</button>
      </div>

      <!-- Transaction list below form -->
      <h3>History</h3>
      <ul id="list" class="list">
        <!-- JS will add <li> here -->
      </ul>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
